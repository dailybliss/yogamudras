:root{--paper:#F4F7F0;--cream:#FBFCF9;--forest:#1B3A2B;--forest-soft:#25503B;--sage:#5E7C64;--moss:#E7EFE3;--gold:#B08D57;--ink:#223026;--line:rgba(27,58,43,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito Sans",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);line-height:1.7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}

.logo{font-family:"Petit Formal Script",cursive;font-size:2rem;color:var(--forest);line-height:1.15;margin-bottom:44px}

p{color:var(--sage);max-width:460px;margin:0 auto 34px}
.btns{display:flex;gap:13px;justify-content:center;flex-wrap:wrap}
.btn{background:var(--forest);color:var(--cream);padding:15px 30px;border-radius:100px;font-weight:700;font-size:.92rem;transition:background .25s}
.btn:hover{background:var(--forest-soft)}
.btn.ghost{background:transparent;color:var(--forest);border:1.5px solid var(--line)}
.btn.ghost:hover{background:var(--cream);border-color:var(--gold)}
.links{margin-top:42px;padding-top:26px;border-top:1px solid var(--line);max-width:520px;width:100%}
.links span{font-size:.7rem;letter-spacing:.24em;text-transform:uppercase;color:var(--sage);font-weight:700;display:block;margin-bottom:14px}
.links a{font-size:.9rem;color:var(--forest);font-weight:600;margin:0 12px;line-height:2.2;border-bottom:1px solid var(--gold)}
